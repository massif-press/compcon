name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build-nocheck

      - name: i18n keys
        run: yarn i18n:check

      - name: Type-check (informational)
        continue-on-error: true
        run: |
          npx vue-tsc --noEmit 2>&1 | tee /tmp/tsc.log || true
          echo "vue-tsc error count: $(grep -c 'error TS' /tmp/tsc.log || echo 0)"

      - name: Lint (informational)
        continue-on-error: true
        run: npx eslint src/

      - name: Dependency audit (informational)
        continue-on-error: true
        run: yarn npm audit --environment production || true

      - name: Bundle size report
        run: |
          echo "Total dist size:"
          du -sh dist
          echo "Largest JS chunks:"
          find dist -name '*.js' -printf '%s\t%p\n' 2>/dev/null \
            | sort -rn | head -15 \
            | awk '{printf "%8.1f KiB  %s\n", $1/1024, $2}'
