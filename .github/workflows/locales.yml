name: Locales sync

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: locales-sync
  cancel-in-progress: false

env:
  LOCALES_BRANCH: automated/locales-sync

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Sync base catalogs to compcon-locales (PR)
        env:
          GH_TOKEN: ${{ secrets.LOCALES_PR_TOKEN }}
        run: |
          gh auth setup-git
          gh repo clone massif-press/compcon-locales locales-repo
