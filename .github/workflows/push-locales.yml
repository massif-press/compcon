name: Push base locale

on:
  push:
    branches: [dev]
    paths:
      - 'src/i18n/locales/en.json'
  workflow_dispatch:

concurrency:
  group: push-locales
  cancel-in-progress: false

jobs:
  push-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start ssh-agent with locales deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LOCALES_DEPLOY_KEY }}

      - name: Clone compcon-locales
        run: git clone git@github.com:massif-press/compcon-locales.git locales-repo

      - name: Copy base catalog
        run: cp src/i18n/locales/en.json locales-repo/ui/en.json

      - name: Commit and push if changed
        working-directory: locales-repo
        run: |
          git config user.name 'compcon-bot'
          git config user.email 'bot@compcon.app'
          if git diff --quiet -- ui/en.json; then
            echo 'ui/en.json already up to date; nothing to push.'
            exit 0
          fi
          git add ui/en.json
          git commit -m 'chore: sync UI base catalog from compcon@${{ github.sha }}'
          git push origin master
